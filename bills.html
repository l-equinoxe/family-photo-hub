<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Hub - Bills</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header sub-page-header">
        <div class="header-content">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
            <h1>📋 Bills & Utilities</h1>
        </div>
    </header>

    <main class="hub-container single-column">
        <section class="hub-card">
            <ul class="bill-list">
                <li class="bill-item unpaid">
                    <div class="bill-info">
                        <span class="bill-name">Electricity</span>
                        <span class="bill-due">Due: June 25</span>
                    </div>
                    <span class="bill-amount">15,000 ₸</span>
                </li>
                <li class="bill-item unpaid">
                    <div class="bill-info">
                        <span class="bill-name">Internet</span>
                        <span class="bill-due">Due: June 28</span>
                    </div>
                    <span class="bill-amount">7,000 ₸</span>
                </li>
                <li class="bill-item paid">
                    <div class="bill-info">
                        <span class="bill-name">Water & Trash</span>
                        <span class="bill-due">Paid ✓</span>
                    </div>
                    <span class="bill-amount">4,500 ₸</span>
                </li>
            </ul>
        </section>
    </main>

</body>
</html>
