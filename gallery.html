<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Hub - Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header sub-page-header">
        <div class="header-content">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
            <h1>📸 Photo Archive</h1>
        </div>
    </header>

    <main class="hub-container gallery-grid">
        <div class="photo-card-v2">
            <img src="https://picsum.photos/600/400?random=1" alt="Gallery image">
            <div class="photo-meta"><h3>Summer Barbecue</h3><p>June 2026</p></div>
        </div>
        <div class="photo-card-v2">
            <img src="https://picsum.photos/600/400?random=2" alt="Gallery image">
            <div class="photo-meta"><h3>Weekend Walk</h3><p>May 2026</p></div>
        </div>
        <div class="photo-card-v2">
            <img src="https://picsum.photos/600/400?random=3" alt="Gallery image">
            <div class="photo-meta"><h3>Family Dinner</h3><p>April 2026</p></div>
        </div>
    </main>

</body>
</html>
